# ============================================================
# GitHub Actions CI/CD Workflow — OpenShift 4.x on AWS (ROSA)
# File: .github/workflows/ocp4-deploy.yml
#
# Triggers on push to main branch or PR to main.
# Pipeline stages:
#   1. Build Docker image
#   2. Security scan with Trivy
#   3. Push to Amazon ECR
#   4. Deploy to OCP4 via ArgoCD sync (GitOps)
#   5. Smoke test post-deployment
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID        - AWS IAM access key
#   AWS_SECRET_ACCESS_KEY    - AWS IAM secret key
#   AWS_REGION               - e.g. ap-south-1
#   ECR_REGISTRY             - e.g. 123456789.dkr.ecr.ap-south-1.amazonaws.com
#   OCP4_SERVER              - https://api.ocp4-prod.example.com:6443
#   OCP4_TOKEN               - OpenShift service account token
#   ARGOCD_SERVER            - argocd.ocp4-prod.example.com
#   ARGOCD_AUTH_TOKEN        - ArgoCD API token
# ============================================================

name: OCP4 Build, Scan & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: my-app
  OCP_NAMESPACE: production
  HELM_CHART_PATH: helm/my-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ----------------------------------------------------------
  # JOB 1: Build & Push Docker Image to ECR
  # ----------------------------------------------------------
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          docker build \
            --build-arg APP_VERSION=${{ env.IMAGE_TAG }} \
            --tag "${IMAGE_URI}" \
            --file Dockerfile .
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      # ---- Security Scan with Trivy ----
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    ${{ steps.build.outputs.image_uri }}
          format:       sarif
          output:       trivy-results.sarif
          severity:     CRITICAL,HIGH
          exit-code:    1          # Fail pipeline on critical/high CVEs

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ECR
        run: docker push ${{ steps.build.outputs.image_uri }}

      - name: Tag image as latest (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          LATEST_URI="${{ secrets.ECR_REGISTRY }}/${{ env.APP_NAME }}:latest"
          docker tag ${{ steps.build.outputs.image_uri }} "${LATEST_URI}"
          docker push "${LATEST_URI}"

  # ----------------------------------------------------------
  # JOB 2: Update Helm values & commit (triggers ArgoCD sync)
  # ----------------------------------------------------------
  update-helm-values:
    name: Update Helm Image Tag
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps manifests repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in Helm values
        run: |
          # Update the image tag in the Helm values file for production
          sed -i "s|tag:.*|tag: \"${{ env.IMAGE_TAG }}\"|g" \
            ${{ env.HELM_CHART_PATH }}/values-production.yaml

          # Also update the ECR registry if needed
          sed -i "s|repository:.*|repository: ${{ secrets.ECR_REGISTRY }}/${{ env.APP_NAME }}|g" \
            ${{ env.HELM_CHART_PATH }}/values-production.yaml

      - name: Commit and push updated Helm values
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_CHART_PATH }}/values-production.yaml
          git commit -m "chore: update ${{ env.APP_NAME }} image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push

  # ----------------------------------------------------------
  # JOB 3: Trigger ArgoCD Sync & Wait for Healthy
  # ----------------------------------------------------------
  argocd-deploy:
    name: ArgoCD Sync to OCP4
    runs-on: ubuntu-latest
    needs: update-helm-values
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
            --grpc-web \
            --insecure

      - name: Trigger ArgoCD sync
        run: |
          argocd app sync production-app \
            --force \
            --prune \
            --timeout 300

      - name: Wait for Argo
        run: |
          argocd app wait production-app \
            --health \
            --timeout 300

      - name: Print sync status
        run: argocd app get production-app

  # ----------------------------------------------------------
  # JOB 4: Post-Deployment Smoke Test on OCP4
  # ----------------------------------------------------------
  smoke-test:
    name: Smoke Test on OCP4
    runs-on: ubuntu-latest
    needs: argocd-deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz
          tar xvf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login to OCP4 cluster
        run: |
          oc login ${{ secrets.OCP4_SERVER }} \
            --token=${{ secrets.OCP4_TOKEN }} \
            --insecure-skip-tls-verify=true

      - name: Verify all pods are Running
        run: |
          echo "Waiting for rollout to complete..."
          oc rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.OCP_NAMESPACE }} \
            --timeout=180s

          echo "Checking pod status..."
          oc get pods -n ${{ env.OCP_NAMESPACE }} -l app=${{ env.APP_NAME }}

          RUNNING=$(oc get pods -n ${{ env.OCP_NAMESPACE }} \
            -l app=${{ env.APP_NAME }} \
            --field-selector=status.phase=Running \
            --no-headers | wc -l)

          echo "Running pods: ${RUNNING}"
          [ "${RUNNING}" -gt "0" ] || (echo "No running pods found!" && exit 1)

      - name: HTTP health-check via OpenShift Route
        run: |
          ROUTE_HOST=$(oc get route ${{ env.APP_NAME }} \
            -n ${{ env.OCP_NAMESPACE }} \
            -o jsonpath='{.spec.host}')
          echo "Testing https://${ROUTE_HOST}/health"

          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            "https://${ROUTE_HOST}/health")

          echo "HTTP Status: ${HTTP_STATUS}"
          [ "${HTTP_STATUS}" == "200" ] || \
            (echo "Health check failed with status ${HTTP_STATUS}" && exit 1)

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Deployment of ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} to OCP4 SUCCEEDED"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED — ArgoCD will self-heal or manual rollback needed"
          oc rollout undo deployment/${{ env.APP_NAME }} -n ${{ env.OCP_NAMESPACE }} || true
